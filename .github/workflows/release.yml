name: Release Binaries

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ccstatusline-native-release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Run required checks
    uses: ./.github/workflows/ci.yml

  build:
    name: Build ${{ matrix.artifact_name }}
    needs: checks
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: ccstatusline-native-macos-arm64
            binary_name: ccstatusline-native
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ccstatusline-native-linux-x86_64
            binary_name: ccstatusline-native

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Cache Cargo data
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binary and documentation
        shell: bash
        run: |
          set -euo pipefail
          package="${{ matrix.artifact_name }}"
          mkdir -p "dist/$package"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$package/"
          cp README.md LICENSE THIRD_PARTY_NOTICES.md "dist/$package/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"
          (cd dist && shasum -a 256 "$package.tar.gz" > "$package.tar.gz.sha256")
          (cd dist && shasum -a 256 -c "$package.tar.gz.sha256")

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.tar.gz
            dist/${{ matrix.artifact_name }}.tar.gz.sha256
          if-no-files-found: error

  publish-release:
    name: Publish tagged release assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" release-assets/* --clobber

  publish-nightly:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare nightly release notes
        run: |
          cat > nightly-notes.md <<EOF
          Nightly build from \`${GITHUB_SHA}\`.

          This prerelease is replaced by each main-branch push or manually dispatched run.
          EOF

      - name: Publish nightly assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          NIGHTLY_TAG: nightly
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$NIGHTLY_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$NIGHTLY_TAG"

          if gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
            gh release edit "$NIGHTLY_TAG" \
              --title "Nightly Build" \
              --notes-file nightly-notes.md \
              --prerelease \
              --target "$GITHUB_SHA"
          else
            gh release create "$NIGHTLY_TAG" \
              --title "Nightly Build" \
              --notes-file nightly-notes.md \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$NIGHTLY_TAG" release-assets/* --clobber
